<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List Bertingkat</title>
  </head>
  <body>
    <!-- Membuat header (judul utama), yaitu list bahasa pemrograman dan framework-nya -->
    <h1>Bahasa Pemrograman dan Framework-nya</h1>

    <!-- Membuat Luarannya yaitu ordered list, ada 3: Web Programming, Backend Programming, dan Mobile Programming -->
    <ol>
      <!-- Ordered list pertama, yaitu Web Programming-->
      <li>Web Programming</li>
      <!-- Sub list/list dalamnya (di dalam web programming), yaitu unordered list-->
      <ul>
        <!-- Isi pertama dari unordered list, yaitu HTML-->
        <li>HTML</li>
        <!-- Isi kedua dari unordered list, yaitu CSS-->
        <li>CSS</li>
        <!-- Isi ketiga dari unordered list, yaitu JavaScript-->
        <li>JavaScript</li>
        <!-- Penutup unordered list untuk Web Programming -->
      </ul>

      <!-- Ordered list kedua, yaitu Backend Programming -->
      <li>Backend Programming</li>
      <!-- Sub list/list dalamnya (di dalam backend programming), yaitu unordered list-->
      <ul>
        <li>PHP</li>
        <li>Python</li>
        <li>Java</li>
        <!-- Penutup unordered list untuk Backend Programming -->
      </ul>

      <!-- Ordered list ketiga, yaitu Mobile Programming -->
      <li>Mobile Programming</li>
      <!-- Sub list/list dalamnya (di dalam mobile programming), yaitu unordered list-->
      <ul>
        <li>Kotlin</li>
        <li>Flutter</li>
        <!-- Penutup unordered list untuk Mobile Programming -->
      </ul>
      <!-- Penutup ordered list setelah semua list dan sub list dimasukkan -->
    </ol>
  </body>
</html>
