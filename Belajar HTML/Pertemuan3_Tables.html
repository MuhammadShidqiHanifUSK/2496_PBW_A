<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pertemuan 3 - Tables</title>
  </head>
  <body>
    <hr />
    <h1>Belajar Membuat Tabel</h1>
    <hr />

    <ol>
      <li><strong>Struktur Dasar Tabel:</strong></li>
      <table>
        <tr>
          <th>No.</th>
          <th>Nama</th>
          <th>Usia</th>
        </tr>
        <tr>
          <td>1</td>
          <td>Fulan</td>
          <td>25</td>
        </tr>
        <tr>
          <td>2</td>
          <td>Fulanah</td>
          <td>20</td>
        </tr>
      </table>

      <li><strong>Menambahkan Border pada Tabel:</strong></li>
      <table border="1">
        <tr>
          <th>No.</th>
          <th>Nama</th>
          <th>Usia</th>
        </tr>
        <tr>
          <td>1</td>
          <td>Fulan</td>
          <td>25</td>
        </tr>
        <tr>
          <td>2</td>
          <td>Fulanah</td>
          <td>20</td>
        </tr>
      </table>
      
      <li>
        <strong>Belajar mandiri:</strong> 
        <a href=https://www.w3schools.com/html/html_tables.asp 
        target="_blank">W3Schools - HTML Tables
        </a>
    </li>
    </ol>
  </body>
</html>
